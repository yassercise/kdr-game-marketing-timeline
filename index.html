.controls{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;box-shadow:0 1px 4px rgba(0,0,0,.07)}

.field-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}

.btn-add{background:#6c63ff;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer}

.mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}

.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9px;font-weight:700;color:#aaa;text-align:center;padding:2px 0}

.cal-day:hover{background:#e8e8f0}

.cal-day.today{border:1.5px solid #6c63ff;color:#6c63ff}

.cal-day.empty{cursor:default}

<div class="header">

  <div class="launch-badge"><span class="launch-dot"></span>Launch Day — August 12, 2026</div>

<div class="controls">

    </select>

</div>

<div class="toolbar">

</div>

<div class="cal-popup-overlay" id="cal-popup-overlay" onclick="handleCalOverlayClick(event)">

const CAT_BG={"Pre-Launch Content":"EBF5FB","Teaser Phase":"FEF9E7","Launch":"FDEDEC","Brand Collaborations":"EAFAF1","Influencers":"F5EEF8","Bahrain Sports City":"FEF5E7","Competition & Leaderboard":"EBF5FB","UGC":"E8F8F5","Email / CRM":"FDF2E9","Post-Campaign":"F2F3F4"};
const CAT_ORDER=Object.keys(CAT_COLORS);
let owners=['Yasir','Design Team','Videography','Digital Solutions','Corporate Comms','CRM','KDR Channel'];

function populateSelects(){
  ['inp-owner','ed-owner'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML='<option value="">Select owner</option>'+owners.map(o=>`<option value="${o}">${o}</option>`).join('')+'<option value="__new__">+ Add new owner</option>';
    if(cur&&cur!=='__new__')sel.value=cur;
  });
  ['inp-cat','ed-cat'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=CAT_ORDER.map(c=>`<option value="${c}">${c}</option>`).join('')+'<option value="__new__">+ Add new category</option>';
    if(cur&&cur!=='__new__')sel.value=cur;
  });
}

function handleOwnerChange(selId){
  const sel=document.getElementById(selId);
  if(sel.value!=='__new__')return;
  const name=(prompt('New owner name:')||'').trim();
  if(name&&!owners.includes(name)){owners.push(name);saveOwners();populateSelects();}
  sel.value=name&&owners.includes(name)?name:'';
}

function handleCatChange(selId){
  const sel=document.getElementById(selId);
  if(sel.value!=='__new__')return;
  const name=(prompt('New category name:')||'').trim();
  if(name&&!CAT_ORDER.includes(name)){
    CAT_ORDER.push(name);CAT_COLORS[name]='888888';CAT_BG[name]='F5F5F5';
    saveCats();populateSelects();render();
  }
  sel.value=name&&CAT_ORDER.includes(name)?name:CAT_ORDER[0];
}

function saveOwners(){try{localStorage.setItem('kdr-owners',JSON.stringify(owners));}catch(e){}}
function saveCats(){try{localStorage.setItem('kdr-cats',JSON.stringify({order:[...CAT_ORDER],colors:{...CAT_COLORS},bgs:{...CAT_BG}}));}catch(e){}}

function loadMeta(){
  try{const o=localStorage.getItem('kdr-owners');if(o)JSON.parse(o).forEach(x=>{if(!owners.includes(x))owners.push(x);});}catch(e){}
  try{
    const c=localStorage.getItem('kdr-cats');
    if(c){const p=JSON.parse(c);p.order.forEach(x=>{if(!CAT_ORDER.includes(x)){CAT_ORDER.push(x);CAT_COLORS[x]=p.colors[x]||'888888';CAT_BG[x]=p.bgs[x]||'F5F5F5';}});}
  }catch(e){}
  populateSelects();
}

  {cat:"Email / CRM",task:"Email 2 — Midway leaderboard update",owner:"CRM",dates:["2026-08-26"]},
  {cat:"Email / CRM",task:"Email 3 — Last chance",owner:"CRM",dates:["2026-09-07"]},
  {cat:"Email / CRM",task:"Email 4 — Winners + consolation offer",owner:"CRM",dates:["2026-09-15"]},
  {cat:"Post-Campaign",task:"Campaign performance report",owner:"Design Team",dates:["2026-09-16","2026-09-17","2026-09-18","2026-09-21","2026-09-22","2026-09-23","2026-09-24","2026-09-25"]},
  {cat:"Post-Campaign",task:"CRM database handoff to rental team",owner:"CRM",dates:["2026-09-16","2026-09-17","2026-09-18","2026-09-21"]},
];

const STORAGE_KEY='kdr-gantt-tasks-v4';
let tasks=JSON.parse(JSON.stringify(DEFAULT));
let filterMode='all';
let editIdx=-1;
let newDates=[];
let editDates=[];

const _td=new Date();const TODAY=`${_td.getFullYear()}-${String(_td.getMonth()+1).padStart(2,'0')}-${String(_td.getDate()).padStart(2,'0')}`;
const START=new Date('2026-07-06T00:00:00');
const END=new Date('2026-09-30T00:00:00');
const LAUNCH='2026-08-12';

function allDates(){let d=[],c=new Date(START);while(c<=END){d.push(new Date(c));c.setDate(c.getDate()+1);}return d;}
function fmt(d){if(!(d instanceof Date))return d;const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}

function getActiveDates(){
  const s=new Set();
  tasks.forEach(t=>(t.dates||[]).forEach(d=>s.add(d)));
  return s;
}
function getUpcomingDates(){
  const s=new Set(),tod=TODAY;
  tasks.forEach(t=>(t.dates||[]).filter(d=>d>=tod).forEach(d=>s.add(d)));
  return s;
}

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));setStatus('Saved at '+new Date().toLocaleTimeString());}
  catch(e){setStatus('Could not save.');}
}
function setStatus(m){document.getElementById('status').textContent=m;}
function setFilter(mode,btn){filterMode=mode;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

// ── Shared calendar popup ─────────────────────────────────
const calState={year:2026,month:6};
let activeCalNs='inp';
const DOWS=['Su','Mo','Tu','We','Th','Fr','Sa'];

function fmtCal(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function openCal(ns){
  activeCalNs=ns;
  calState.year=2026;calState.month=6;
  const dates=ns==='inp'?newDates:editDates;
  if(dates.length){calState.year=parseInt(dates[0].split('-')[0]);calState.month=parseInt(dates[0].split('-')[1])-1;}
  document.getElementById('cal-popup-title').textContent=ns==='inp'?'Select dates':'Edit dates';
  document.getElementById('cal-popup-overlay').classList.add('open');
  renderCal();
}

function closeCal(){
  document.getElementById('cal-popup-overlay').classList.remove('open');
  renderCalTags(activeCalNs);
}

function handleCalOverlayClick(e){if(e.target===document.getElementById('cal-popup-overlay'))closeCal();}

function clearCalDates(){
  if(activeCalNs==='inp')newDates.length=0;else editDates.length=0;
  renderCal();
}

function calNav(ns,dir){
  calState.month+=dir;
  if(calState.month>11){calState.month=0;calState.year++;}
  if(calState.month<0){calState.month=11;calState.year--;}
  renderCal();
}

function renderCal(){
  const ns=activeCalNs;
  const {year,month}=calState;
  const dates=ns==='inp'?newDates:editDates;
  const label=new Date(year,month,1).toLocaleString('default',{month:'long',year:'numeric'});
  document.getElementById('_active-cal-label').textContent=label;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let html=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const fd=fmtCal(year,month,d);
    const sel=dates.includes(fd);
    const tod=fd===TODAY;
    const dow=new Date(year,month,d).getDay();
    const wk=dow===5||dow===6;
    html+=`<div class="cal-day${sel?' selected':''}${tod&&!sel?' today':''}${wk&&!sel?' weekend':''}" onclick="toggleCalDate('${fd}')">${d}</div>`;
  }
  document.getElementById('_active-cal-grid').innerHTML=html;
  const tagEl=document.getElementById('_active-dates-tags');
  tagEl.innerHTML=dates.sort().map(d=>`<div class="date-tag">${d}<span onclick="toggleCalDate('${d}')">✕</span></div>`).join('');
  const countEl=document.getElementById(`${ns}-dates-count`);
  if(countEl)countEl.textContent=dates.length?`(${dates.length} selected)`:'';
}

function toggleCalDate(fd){
  const arr=activeCalNs==='inp'?newDates:editDates;
  const i=arr.indexOf(fd);
  if(i>=0)arr.splice(i,1);else arr.push(fd);
  renderCal();
}

function renderCalTags(ns){
  const arr=ns==='inp'?newDates:editDates;
  const el=document.getElementById(`${ns}-dates-tags`);
  const countEl=document.getElementById(`${ns}-dates-count`);
  if(countEl)countEl.textContent=arr.length?`(${arr.length} selected)`:'';
  if(el)el.innerHTML=arr.sort().map(d=>`<div class="date-tag">${d}<span onclick="removeDateTag('${ns}','${d}')">✕</span></div>`).join('');
}

function removeDateTag(ns,fd){
  const arr=ns==='inp'?newDates:editDates;
  const i=arr.indexOf(fd);if(i>=0)arr.splice(i,1);
  renderCalTags(ns);
}

function initCals(){newDates=[];editDates=[];}

function render(){
  const allD=allDates();
  const activeSet=filterMode==='active'?getActiveDates():filterMode==='upcoming'?getUpcomingDates():null;
  const dates=activeSet?allD.filter(d=>activeSet.has(fmt(d))):allD;
  const months={};
  dates.forEach(d=>{const k=d.getFullYear()+'-'+d.getMonth();if(!months[k]){months[k]={label:d.toLocaleString('default',{month:'long',year:'numeric'}),count:0};}months[k].count++;});

  let html='<table><thead><tr><th class="h-act" rowspan="2">Activity</th><th class="h-own" rowspan="2">Owner</th>';
  Object.values(months).forEach(m=>{html+=`<th class="h-month" colspan="${m.count}">${m.label}</th>`;});
  html+='<th class="h-del" rowspan="2"></th></tr><tr>';
  dates.forEach(d=>{
    const wk=d.getDay()===5||d.getDay()===6,tod=fmt(d)===TODAY,launch=fmt(d)===LAUNCH;
    html+=`<th class="h-day${wk?' weekend':''}${tod?' today-h':''}${launch?' launch-h':''}">${d.getDate()}</th>`;
  });
  html+='</tr></thead><tbody>';

  CAT_ORDER.forEach(cat=>{
    const ct=tasks.filter(t=>t.cat===cat);
    if(!ct.length)return;
    const col=CAT_COLORS[cat],bg=CAT_BG[cat];
    html+=`<tr class="cat-row" data-cat="${cat}"><td colspan="${dates.length+3}" style="background:#${bg};color:#${col};border-left:4px solid #${col}">${cat}</td></tr>`;
    ct.forEach((t,ti)=>{
      const idx=tasks.indexOf(t);
      const taskDates=new Set(t.dates||[]);
      const even=ti%2===0;
      const rb=even?'#fff':'#fcfcfe';
      html+=`<tr class="task-row" draggable="true" data-idx="${idx}" data-cat="${cat}">
        <td class="t-act" style="background:${rb}">
          <span class="drag-handle" title="Drag to reorder">⠿</span><span onclick="openEdit(${idx})" style="cursor:pointer" title="Click to edit">${t.task}</span>
        </td>
        <td class="t-own" style="background:${rb}">${t.owner||''}</td>`;
      dates.forEach(d=>{
        const wk=d.getDay()===5||d.getDay()===6,fd=fmt(d),inR=taskDates.has(fd),tod=fd===TODAY,launch=fd===LAUNCH;
        let cell='';
        if(inR){cell=`<span class="dot" style="background:#${col};opacity:.9"></span>`;}
        html+=`<td class="t-day${wk&&!inR?' weekend':''}${tod?' today-d':''}${launch?' launch-d':''}" style="${wk&&!inR?'background:#fafafa':''}">${cell}</td>`;
      });
      html+=`<td class="t-del"><button class="btn-del" onclick="delTask(${idx})">✕</button></td></tr>`;
    });
  });
  html+='</tbody></table>';
  document.getElementById('gantt-wrap').innerHTML=html;
  let leg='';
  CAT_ORDER.forEach(c=>{if(tasks.some(t=>t.cat===c))leg+=`<div class="leg-item"><div class="leg-dot" style="background:#${CAT_COLORS[c]}"></div>${c}</div>`;});
  document.getElementById('legend').innerHTML=leg;
  initDrag();
}

let dragSrcIdx=null;
function initDrag(){
  document.querySelectorAll('.task-row[draggable]').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      dragSrcIdx=parseInt(row.dataset.idx);
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('dragging','drag-over'));
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(parseInt(row.dataset.idx)===dragSrcIdx)return;
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('drop',e=>{
      e.preventDefault();
      const targetIdx=parseInt(row.dataset.idx);
      if(dragSrcIdx===null||dragSrcIdx===targetIdx)return;
      const srcCat=tasks[dragSrcIdx].cat,tgtCat=tasks[targetIdx].cat;
      if(srcCat!==tgtCat)return;
      const item=tasks.splice(dragSrcIdx,1)[0];
      const newTarget=tasks.indexOf(tasks.find((_,i)=>i===(targetIdx>dragSrcIdx?targetIdx-1:targetIdx)));
      tasks.splice(targetIdx>dragSrcIdx?targetIdx-1:targetIdx,0,item);
      dragSrcIdx=null;
      save();render();
    });
  });
}

function addTask(){
  const task=document.getElementById('inp-task').value.trim();
  const owner=document.getElementById('inp-owner').value;
  const cat=document.getElementById('inp-cat').value;
  if(!task){alert('Fill in Activity name.');return;}
  if(!newDates.length){alert('Select at least one date on the calendar.');return;}
  tasks.push({cat,task,owner,dates:[...newDates]});
  document.getElementById('inp-task').value='';
  document.getElementById('inp-owner').value='';
  newDates=[];
  renderCalTags('inp');
  save();render();
}
function delTask(idx){if(!confirm('Delete "'+tasks[idx].task+'"?'))return;tasks.splice(idx,1);save();render();}
function openEdit(idx){
  editIdx=idx;const t=tasks[idx];
  document.getElementById('ed-task').value=t.task;
  populateSelects();
  document.getElementById('ed-owner').value=t.owner||'';
  document.getElementById('ed-cat').value=t.cat;
  editDates=[...(t.dates||[])];
  renderCalTags('ed');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editIdx=-1;editDates=[];}
function saveEdit(){
  if(!editDates.length){alert('Select at least one date.');return;}
  tasks[editIdx]={task:document.getElementById('ed-task').value.trim(),owner:document.getElementById('ed-owner').value,cat:document.getElementById('ed-cat').value,dates:[...editDates]};
  closeModal();save();render();
}
function resetToDefault(){if(!confirm('Reset all tasks to default?'))return;tasks=JSON.parse(JSON.stringify(DEFAULT));save();render();}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('gantt-wrap').addEventListener('mouseover',function(e){
  const td=e.target.closest('td.t-day');
  if(!td)return;
  const row=td.parentNode;
  const colIdx=Array.from(row.cells).indexOf(td);
  const table=td.closest('table');
  clearHover(table);
  table.querySelectorAll('tr').forEach(r=>{
    const cell=r.cells[colIdx];
    if(cell)cell.classList.add('dot-hover');
  });
  const headerCells=table.querySelectorAll('thead tr:last-child th');
  if(headerCells[colIdx-2])headerCells[colIdx-2].classList.add('col-hover');
});
document.getElementById('gantt-wrap').addEventListener('mouseout',function(e){
  const td=e.target.closest('td.t-day');
  if(!td)return;
  const related=e.relatedTarget?e.relatedTarget.closest('td.t-day'):null;
  if(!related)clearHover(td.closest('table'));
});
function clearHover(table){
  table.querySelectorAll('.dot-hover').forEach(el=>el.classList.remove('dot-hover'));
  table.querySelectorAll('.col-hover').forEach(el=>el.classList.remove('col-hover'));
}
function load(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)tasks=JSON.parse(d);}catch(e){}
  loadMeta();
  initCals();
  render();
}
load();
</script>
</body>
</html>
